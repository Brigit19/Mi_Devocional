<style>
  :root{
    --bg:#FDF5F8;
    --bg-card:#FFFFFF;
    --ink:#5B4B57;
    --ink-soft:#AD90A3;
    --primary:#C98CAE;
    --primary-dark:#93547A;
    --fuchsia:#EFB8D2;
    --gold:#D9B368;
    --gold-soft:#FCEEDD;
    --success:#5E9A78;
    --success-bg:#E7F5EC;
    --danger:#C97676;
    --danger-bg:#FBEAEA;
    --line:#F3E1EB;
    --shadow: 0 10px 30px -12px rgba(147,84,122,0.22);
  }
  body.dark-mode {
    --bg:#1a1415;
    --bg-card:#2d2527;
    --ink:#e8d9e0;
    --ink-soft:#b8a0ab;
    --primary:#d9a8c4;
    --primary-dark:#e8c8da;
    --fuchsia:#d9a8c4;
    --gold:#c9985a;
    --gold-soft:#4a3a2a;
    --success:#6fb882;
    --success-bg:#2a4a35;
    --danger:#d9898a;
    --danger-bg:#4a2a2b;
    --line:#3a2a35;
    --shadow: 0 10px 30px -12px rgba(0,0,0,0.5);
  }
  .dark-mode-toggle{
    position: fixed; top: 16px; left: 20px; z-index: 150;
    background: var(--bg-card); border: 1.5px solid var(--line);
    border-radius: 24px; padding: 8px 12px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center;
    box-shadow: 0 2px 8px -4px var(--shadow);
    transition: .2s;
  }
  .dark-mode-toggle:hover{ transform: scale(1.1); }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Playfair Display',serif; }
  #app{ max-width:520px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:40px;}
  .wide #app{ max-width:960px; }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 14px; position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--fuchsia), var(--primary-dark));
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
  }
  .brand-text{ font-family:'Playfair Display',serif; font-weight:600; font-size:17px; color:var(--primary-dark); line-height:1.1;}
  .brand-text small{ display:block; font-family:'Inter',sans-serif; font-weight:500; font-size:11px; letter-spacing:.08em; color:var(--ink-soft); text-transform:uppercase; }
  .icon-btn{
    background:none;border:none; color:var(--ink-soft); cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    padding:8px 12px; border-radius:20px; transition:.15s;
  }
  .icon-btn:hover{ background:var(--gold-soft); color:var(--primary-dark); }

  main{ padding:0 20px; }
  .screen{ animation: fadeUp .35s ease both; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ---------- role select ---------- */
  .hero{ text-align:center; padding:36px 12px 18px; }
  .hero-mark{
    width:64px;height:64px;margin:0 auto 18px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--fuchsia), var(--primary-dark) 70%);
    box-shadow: var(--shadow), inset 0 0 0 3px rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif; color:#fff; font-size:26px;
  }
  .hero h1{ font-size:26px; margin:0 0 6px; color:var(--primary-dark); font-weight:600; }
  .hero p{ color:var(--ink-soft); font-size:14px; margin:0; }

  .role-grid{ display:flex; flex-direction:column; gap:14px; margin-top:28px; }
  .role-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:18px;
    padding:22px; text-align:left; cursor:pointer; display:flex; align-items:center; gap:16px;
    transition:.18s; box-shadow:0 2px 10px -6px rgba(122,31,75,.15);
  }
  .role-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--fuchsia); }
  .role-emblem{
    width:46px;height:46px;border-radius:14px; flex-shrink:0;
    display:flex;align-items:center;justify-content:center; font-size:20px;
    background:var(--gold-soft); color:var(--primary-dark);
  }
  .role-card h3{ margin:0 0 3px; font-size:17px; color:var(--ink); }
  .role-card p{ margin:0; font-size:12.5px; color:var(--ink-soft); }

  /* ---------- forms ---------- */
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:20px;
    padding:24px; box-shadow:0 2px 14px -8px rgba(122,31,75,.18);
  }
  label{ display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:16px 0 6px; }
  label:first-child{ margin-top:0; }
  select, input[type=text], input[type=password], input[type=tel], textarea{
    width:100%; padding:13px 14px; border-radius:12px; border:1.5px solid var(--line);
    background:#fff; font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
    outline:none; transition:.15s;
  }
  select:focus, input:focus, textarea:focus{ border-color:var(--fuchsia); box-shadow:0 0 0 3px rgba(192,52,122,.12); }
  textarea{ resize:vertical; min-height:90px; line-height:1.5; }
  .pin-row{ display:flex; gap:10px; }
  .pin-row input{ text-align:center; font-size:22px; letter-spacing:.1em; font-weight:600; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:14px 18px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px; margin-top:20px;
    transition:.15s; letter-spacing:.01em;
  }
  .btn-primary{ background:linear-gradient(135deg, var(--fuchsia), var(--primary-dark)); color:#fff; box-shadow:0 8px 20px -8px rgba(122,31,75,.5); }
  .btn-primary:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:transparent; color:var(--primary-dark); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--fuchsia); background:var(--gold-soft); }
  .btn-sm{ width:auto; padding:9px 16px; font-size:13px; margin-top:0; }

/* ================= STORAGE HELPERS (Firebase Firestore) ================= */
async function sGet(key){
  try{
    const doc = await db.collection('kv').doc(key).get();
    if(!doc.exists) return null;
    return JSON.parse(doc.data().value);
  }catch(e){ console.error('sGet error', key, e); return null; }
}
async function sSet(key, value){
  try{
    await db.collection('kv').doc(key).set({ value: JSON.stringify(value) });
    return true;
  }catch(e){ console.error('sSet error', key, e); return false; }
}
async function sList(prefix){
  try{
    const end = prefix + '\uf8ff';
    const snap = await db.collection('kv')
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', end)
      .get();
    return snap.docs.map(d=>d.id);
  }catch(e){ console.error('sList error', prefix, e); return []; }
}

function slugId(name, idx){
  return 'u' + idx + '_' + name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]+/g,'').slice(0,10);
}

async function ensureSeed(){
  let names = await sGet('nombres');
  if(!names){
    names = DEFAULT_NAMES.map((n,i)=>({ id: slugId(n,i), nombre:n, pin:'0000' }));
    await sSet('nombres', names);
  }
  let config = await sGet('config');
  if(!config){
    config = { leaderPin: '1234' };
    await sSet('config', config);
  }
  return { names, config };
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDateLong(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${meses[m-1]} de ${y}`;
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function monthKey(dateStr){ return dateStr.slice(0,7); }
function addDaysToStr(dateStr, delta){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+delta);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isDateEditable(ds){
  const today = todayStr();
  const yesterday = addDaysToStr(today, -1);
  const tomorrow = addDaysToStr(today, 1);
  return ds===yesterday || ds===today || ds===tomorrow;
}

/* ================= DARK MODE ================= */
async function initDarkMode(){
  const darkModePref = await sGet('darkmode:pref');
  if(darkModePref === true) enableDarkMode();
  
  const toggle = document.createElement('div');
  toggle.className = 'dark-mode-toggle';
  toggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
  toggle.onclick = toggleDarkMode;
  document.body.appendChild(toggle);
}
function toggleDarkMode(){
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  sSet('darkmode:pref', isDark);
  document.querySelector('.dark-mode-toggle').textContent = isDark ? '☀️' : '🌙';
}
function enableDarkMode(){
  document.body.classList.add('dark-mode');
  if(document.querySelector('.dark-mode-toggle')) document.querySelector('.dark-mode-toggle').textContent = '☀️';
}

/* ================= NOTIFICACIONES ================= */
async function scheduleNotifications(){
  // Cada día a las 8am, notificar si no subió devocional
  if(!('Notification' in window)) return;
  
  if(Notification.permission === 'granted') checkAndNotify();
  else if(Notification.permission !== 'denied'){
    Notification.requestPermission().then(perm => {
      if(perm === 'granted') checkAndNotify();
    });
  }
  
  // Verificar cada hora
  setInterval(checkAndNotify, 60*60*1000);
}
async function checkAndNotify(){
  if(!State.currentUser) return;
  const today = todayStr();
  const regKey = 'registro:'+today+':'+State.currentUser.id;
  const registroHoy = await sGet(regKey);
  
  if(!registroHoy){
    const hour = new Date().getHours();
    if(hour >= 8 && hour < 22){ // Entre 8am y 10pm
      new Notification('🌸 Mi Devocional', {
        body: 'No olvides tu devocional de hoy',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23d9a8c4"/><circle cx="50" cy="35" r="12" fill="%23fff"/><circle cx="35" cy="50" r="12" fill="%23fff"/><circle cx="65" cy="50" r="12" fill="%23fff"/><circle cx="50" cy="65" r="12" fill="%23fff"/><circle cx="50" cy="50" r="8" fill="%23d9b368"/></svg>',
        tag: 'devocional-reminder',
        requireInteraction: false
      });
    }
  }
}

/* ================= VERSION CHECK / AUTO-UPDATE BANNER ================= */
const APP_VERSION = "2026-07-12-lanzamiento";
let updateBannerShown = false;
async function checkForUpdate(){
  try{
    const res = await fetch('./version.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) return;
    const data = await res.json();
    const seenVersion = localStorage.getItem('midevocional_seen_version') || APP_VERSION;
    if(data.version && data.version !== seenVersion){
      showUpdateBanner(data.version);
    }
  }catch(e){ }
}
function showUpdateBanner(newVersion){
  if(updateBannerShown) return;
  updateBannerShown = true;
  const bar = document.createElement('div');
  bar.className = 'update-banner';
  bar.innerHTML = `
    <span>🌸 Hay una nueva versión de la app</span>
    <button id="updateNowBtn">Actualizar ahora</button>
  `;
  document.body.appendChild(bar);
  document.getElementById('updateNowBtn').onclick = ()=>{
    localStorage.setItem('midevocional_seen_version', newVersion);
    window.location.href = window.location.pathname + '?v=' + Date.now();
  };
}

function renderEvidenceGallery(reg){
  const fotos = reg.fotos || (reg.foto ? [reg.foto] : []);
  if(!fotos.length) return '';

  return `<div class="thumb-grid">${fotos.map(f=>`<img class="${soloClass}" src="${f}">`).join('')}</div>`;
}

function compressImage(file, maxW=800, quality=0.65){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function computeAndSaveStats(userId, dateStr){
  const prevStreak = (await sGet('streak:'+userId)) || { racha:0, ultimaFecha:null };
  let racha = prevStreak.racha || 0;
  if(prevStreak.ultimaFecha){
    const prevD = new Date(prevStreak.ultimaFecha+'T00:00:00');
    const curD = new Date(dateStr+'T00:00:00');
    const diff = Math.round((curD-prevD)/86400000);
    racha = diff===1 ? racha+1 : 1;
  } else { racha = 1; }
  await sSet('streak:'+userId, { racha, ultimaFecha: dateStr });

  const mKey = 'statsmonth:'+userId+':'+monthKey(dateStr);
  const prevMonth = (await sGet(mKey)) || { totalM:0 };
  const monthStats = { totalM: (prevMonth.totalM||0)+1 };
  await sSet(mKey, monthStats);

  // Celebrar hitos de racha
  const milestones = [7, 14, 21, 30];
  if(milestones.includes(racha)){
    celebrateStreak(racha);
  }

  return { racha, totalM: monthStats.totalM };
}

function celebrateStreak(days){
  playSound();
  createConfetti();
  const messages = {7: '¡Una semana! 🔥', 14: '¡Dos semanas! 🌟', 21: '¡Tres semanas! ✨', 30: '¡Un mes entero! 👑'};
  const msg = messages[days] || '¡Lo lograste!';
  toast(msg);
}

function playSound(){
  try{
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    
    // Crear una melodía bonita (do-mi-sol)
    const freqs = [261.63, 329.63, 392.00]; // C, E, G
    const duration = 0.15;
    
    freqs.forEach((freq, i)=>{
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = freq;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.2, now + i*duration);
      gain.gain.exponentialRampToValueAtTime(0.01, now + (i+1)*duration);
      
      osc.start(now + i*duration);
      osc.stop(now + (i+1)*duration);
    });
  }catch(e){}
}

function createConfetti(){
  const colors = ['#EFB8D2', '#C98CAE', '#D9B368', '#FCEEDD'];
  const confettiCount = 40;
  
  for(let i=0; i<confettiCount; i++){
    const confetti = document.createElement('div');
    confetti.style.cssText = `
      position: fixed;
      width: 10px;
      height: 10px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: 50%;
      left: Math.random()*100%;
      top: -10px;
      pointer-events: none;
      z-index: 999;
      opacity: 0.9;
    `;
    confetti.style.left = Math.random()*100 + '%';
    document.body.appendChild(confetti);
    
    const duration = 2 + Math.random()*1;
    const startX = parseFloat(confetti.style.left);
    const startTime = Date.now();
    
    function animate(){
      const elapsed = (Date.now() - startTime) / 1000;
      const progress = elapsed / duration;
      
      if(progress >= 1){
        confetti.remove();
        return;
      }
      
      const y = progress * window.innerHeight;
      const x = startX + (Math.random()-0.5)*100*progress;
      const rotation = progress*360*Math.random();
      
      confetti.style.top = y + 'px';
      confetti.style.left = x + '%';
      confetti.style.transform = `rotate(${rotation}deg)`;
      confetti.style.opacity = 1 - progress;
      
      requestAnimationFrame(animate);
    }
    animate();
  }
}

      <button class="btn btn-primary btn-sm" id="addGirl" style="width:100%;">Agregar</button>
    </div>
    <div id="senoritaList">${State.names.map(n=>`
      <div class="roster-row" style="cursor:default;">
        <div class="avatar">${n.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div style="flex:1;">
          <div class="roster-name">${n.nombre}</div>
          <div class="roster-sub">PIN: ${n.pin}</div>
        </div>
        <button class="icon-btn" data-reset="${n.id}">Cambiar PIN</button>
      </div>`).join('')}</div>
  `;
  $('#addGirl').onclick = async ()=>{
    const name = $('#newName').value.trim();
    const pin = $('#newPin').value.trim() || '0000';
    if(!name){ toast('Escribe el nombre'); return; }
    const newEntry = { id: slugId(name, State.names.length+Math.floor(Math.random()*999)), nombre:name, pin };
    State.names.push(newEntry);
    await sSet('nombres', State.names);
    toast('Señorita agregada 🌸');
    renderTabSenoritas();
  };
  body.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.reset;
      const p = prompt('Nuevo PIN (4 dígitos):');
      if(!p) return;
      const entry = State.names.find(x=>x.id===id);
      entry.pin = p.trim();
      await sSet('nombres', State.names);
      toast('PIN actualizado');
      renderTabSenoritas();
    };
  });
}

/* --- MODAL: girl detail (leader) --- */
async function openGirlModal(id, dateStr){
  const n = State.names.find(x=>x.id===id);
  const streak = (await sGet('streak:'+id)) || { racha:0 };
  const monthStats = (await sGet('statsmonth:'+id+':'+monthKey(dateStr))) || { totalM:0 };
  
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-height:80vh;overflow-y:auto;">
      <button class="modal-close">×</button>
      <h3>${n.nombre}</h3>
      <p style="color:var(--ink-soft);font-size:13px;margin-top:0;">${monthStats.totalM} días presentados este mes · racha ${streak.racha}🔥</p>
      
      <label style="margin-top:16px;">Selecciona una fecha para ver evidencia:</label>
      <input type="date" id="modalDatePicker" value="${dateStr}" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;margin-bottom:16px;">
      
      <div id="modalEvidenceContent"></div>
    </div>`;
  document.body.appendChild(overlay);
  
  // Load evidence for selected date
  async function loadEvidence(ds){
    const reg = await sGet('registro:'+ds+':'+id);
    const content = document.getElementById('modalEvidenceContent');
    if(reg && (reg.fotos || reg.foto)){
      content.innerHTML = `
        ${renderEvidenceGallery(reg)}
        <p style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Subido: ${new Date(reg.hora).toLocaleString('es-PE')}</p>
      `;
    } else {
      content.innerHTML = `<div class="lock-note">🕊️ Sin evidencia el ${fmtDateLong(ds)}.</div>`;
    }
  }
  
  await loadEvidence(dateStr);
  
  document.getElementById('modalDatePicker').onchange = (e)=>{
    loadEvidence(e.target.value);
  };
  
  overlay.querySelector('.modal-close').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

init();
</script>
</body>
</html>
