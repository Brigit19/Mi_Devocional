<style>
  :root{
    --bg:#FDF5F8;
    --bg-card:#FFFFFF;
    --ink:#5B4B57;
    --ink-soft:#AD90A3;
    --primary:#C98CAE;
    --primary-dark:#93547A;
    --fuchsia:#EFB8D2;
    --gold:#D9B368;
    --gold-soft:#FCEEDD;
    --success:#5E9A78;
    --success-bg:#E7F5EC;
    --danger:#C97676;
    --danger-bg:#FBEAEA;
    --line:#F3E1EB;
    --shadow: 0 10px 30px -12px rgba(147,84,122,0.22);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Playfair Display',serif; }
  #app{ max-width:520px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:40px;}
  .wide #app{ max-width:960px; }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 14px; position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--fuchsia), var(--primary-dark));
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
  }
  .brand-text{ font-family:'Playfair Display',serif; font-weight:600; font-size:17px; color:var(--primary-dark); line-height:1.1;}
  .brand-text small{ display:block; font-family:'Inter',sans-serif; font-weight:500; font-size:11px; letter-spacing:.08em; color:var(--ink-soft); text-transform:uppercase; }
  .icon-btn{
    background:none;border:none; color:var(--ink-soft); cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    padding:8px 12px; border-radius:20px; transition:.15s;
  }
  .icon-btn:hover{ background:var(--gold-soft); color:var(--primary-dark); }

  main{ padding:0 20px; }
  .screen{ animation: fadeUp .35s ease both; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ---------- role select ---------- */
  .hero{ text-align:center; padding:36px 12px 18px; }
  .hero-mark{
    width:64px;height:64px;margin:0 auto 18px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--fuchsia), var(--primary-dark) 70%);
    box-shadow: var(--shadow), inset 0 0 0 3px rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif; color:#fff; font-size:26px;
  }
  .hero h1{ font-size:26px; margin:0 0 6px; color:var(--primary-dark); font-weight:600; }
  .hero p{ color:var(--ink-soft); font-size:14px; margin:0; }

  .role-grid{ display:flex; flex-direction:column; gap:14px; margin-top:28px; }
  .role-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:18px;
    padding:22px; text-align:left; cursor:pointer; display:flex; align-items:center; gap:16px;
    transition:.18s; box-shadow:0 2px 10px -6px rgba(122,31,75,.15);
  }
  .role-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--fuchsia); }
  .role-emblem{
    width:46px;height:46px;border-radius:14px; flex-shrink:0;
    display:flex;align-items:center;justify-content:center; font-size:20px;
    background:var(--gold-soft); color:var(--primary-dark);
  }
  .role-card h3{ margin:0 0 3px; font-size:17px; color:var(--ink); }
  .role-card p{ margin:0; font-size:12.5px; color:var(--ink-soft); }

  /* ---------- forms ---------- */
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:20px;
    padding:24px; box-shadow:0 2px 14px -8px rgba(122,31,75,.18);
  }
  label{ display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:16px 0 6px; }
  label:first-child{ margin-top:0; }
  select, input[type=text], input[type=password], input[type=tel], textarea{
    width:100%; padding:13px 14px; border-radius:12px; border:1.5px solid var(--line);
    background:#fff; font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
    outline:none; transition:.15s;
  }
  select:focus, input:focus, textarea:focus{ border-color:var(--fuchsia); box-shadow:0 0 0 3px rgba(192,52,122,.12); }
  textarea{ resize:vertical; min-height:90px; line-height:1.5; }
  .pin-row{ display:flex; gap:10px; }
  .pin-row input{ text-align:center; font-size:22px; letter-spacing:.1em; font-weight:600; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:14px 18px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px; margin-top:20px;
    transition:.15s; letter-spacing:.01em;
  }
  .btn-primary{ background:linear-gradient(135deg, var(--fuchsia), var(--primary-dark)); color:#fff; box-shadow:0 8px 20px -8px rgba(122,31,75,.5); }
  .btn-primary:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:transparent; color:var(--primary-dark); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--fuchsia); background:var(--gold-soft); }
  .btn-sm{ width:auto; padding:9px 16px; font-size:13px; margin-top:0; }
  .error-msg{ color:var(--danger); font-size:12.5px; margin-top:10px; display:none; }

  /* ---------- devotional hero card ---------- */
  .date-chip{
    display:inline-block; font-size:11.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--primary-dark); background:var(--gold-soft); padding:6px 14px; border-radius:20px; margin-bottom:14px;
  }
  .devo-card{
    background:linear-gradient(160deg, #fff 0%, var(--gold-soft) 130%);
    border:1px solid var(--line); border-radius:24px; padding:28px 24px; position:relative; overflow:hidden;
  }
  .devo-card::before{
    content:"”"; position:absolute; top:-10px; right:16px; font-family:'Playfair Display',serif;
    font-size:120px; color:var(--fuchsia); opacity:.08; line-height:1;
  }
  .devo-verse{ font-family:'Playfair Display',serif; font-style:italic; font-size:19px; line-height:1.55; color:var(--primary-dark); margin:0 0 6px; position:relative; }
  .devo-ref{ font-size:12.5px; font-weight:600; color:var(--fuchsia); letter-spacing:.03em; margin:0 0 18px; }

/* ================= STORAGE HELPERS (Firebase Firestore) ================= */
async function sGet(key){
  try{
    const doc = await db.collection('kv').doc(key).get();
    if(!doc.exists) return null;
    return JSON.parse(doc.data().value);
  }catch(e){ console.error('sGet error', key, e); return null; }
}
async function sSet(key, value){
  try{
    await db.collection('kv').doc(key).set({ value: JSON.stringify(value) });
    return true;
  }catch(e){ console.error('sSet error', key, e); return false; }
}
async function sList(prefix){
  try{
    const end = prefix + '\uf8ff';
    const snap = await db.collection('kv')
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', end)
      .get();
    return snap.docs.map(d=>d.id);
  }catch(e){ console.error('sList error', prefix, e); return []; }
}

function slugId(name, idx){
  return 'u' + idx + '_' + name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]+/g,'').slice(0,10);
}

async function ensureSeed(){
  let names = await sGet('nombres');
  if(!names){
    names = DEFAULT_NAMES.map((n,i)=>({ id: slugId(n,i), nombre:n, pin:'0000' }));
    await sSet('nombres', names);

  let config = await sGet('config');

    await sSet('config', config);

  return { names, config };

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDateLong(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${meses[m-1]} de ${y}`;
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function monthKey(dateStr){ return dateStr.slice(0,7); }
function addDaysToStr(dateStr, delta){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+delta);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isDateEditable(ds){
  const today = todayStr();
  const yesterday = addDaysToStr(today, -1);
  const tomorrow = addDaysToStr(today, 1);
  return ds===yesterday || ds===today || ds===tomorrow;
}

async function renderGirlHome(){

function renderEvidenceGallery(reg){
  const fotos = reg.fotos || (reg.foto ? [reg.foto] : []);
  if(!fotos.length) return '';
  const soloClass = fotos.length===1 ? 'solo' : '';
  return `<div class="thumb-grid">${fotos.map(f=>`<img class="${soloClass}" src="${f}">`).join('')}</div>`;
}

function compressImage(file, maxW=800, quality=0.65){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function computeAndSaveStats(userId, dateStr){
  const prevStreak = (await sGet('streak:'+userId)) || { racha:0, ultimaFecha:null };
  let racha = prevStreak.racha || 0;
  if(prevStreak.ultimaFecha){
    const prevD = new Date(prevStreak.ultimaFecha+'T00:00:00');
    const curD = new Date(dateStr+'T00:00:00');
    const diff = Math.round((curD-prevD)/86400000);
    racha = diff===1 ? racha+1 : 1;
  } else { racha = 1; }
  await sSet('streak:'+userId, { racha, ultimaFecha: dateStr });

  const mKey = 'statsmonth:'+userId+':'+monthKey(dateStr);
  const prevMonth = (await sGet(mKey)) || { totalM:0 };
  const monthStats = { totalM: (prevMonth.totalM||0)+1 };
  await sSet(mKey, monthStats);

  // Celebrar hitos de racha
  const milestones = [7, 14, 21, 30];
  if(milestones.includes(racha)){
    celebrateStreak(racha);
  }

  return { racha, totalM: monthStats.totalM };
}

function celebrateStreak(days){
  playSound();
  createConfetti();
  const messages = {7: '¡Una semana! 🔥', 14: '¡Dos semanas! 🌟', 21: '¡Tres semanas! ✨', 30: '¡Un mes entero! 👑'};
  const msg = messages[days] || '¡Lo lograste!';
  toast(msg);
}

function playSound(){
  try{
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    
    // Crear una melodía bonita (do-mi-sol)
    const freqs = [261.63, 329.63, 392.00]; // C, E, G
    const duration = 0.15;
    
    freqs.forEach((freq, i)=>{
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = freq;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.2, now + i*duration);
      gain.gain.exponentialRampToValueAtTime(0.01, now + (i+1)*duration);
      
      osc.start(now + i*duration);
      osc.stop(now + (i+1)*duration);
    });
  }catch(e){}
}

function createConfetti(){
  const colors = ['#EFB8D2', '#C98CAE', '#D9B368', '#FCEEDD'];
  const confettiCount = 40;
  
  for(let i=0; i<confettiCount; i++){
    const confetti = document.createElement('div');
    confetti.style.cssText = `
      position: fixed;
      width: 10px;
      height: 10px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: 50%;
      left: Math.random()*100%;
      top: -10px;
      pointer-events: none;
      z-index: 999;
      opacity: 0.9;
    `;
    confetti.style.left = Math.random()*100 + '%';
    document.body.appendChild(confetti);
    
    const duration = 2 + Math.random()*1;
    const startX = parseFloat(confetti.style.left);
    const startTime = Date.now();
    
    function animate(){
      const elapsed = (Date.now() - startTime) / 1000;
      const progress = elapsed / duration;
      
      if(progress >= 1){
        confetti.remove();
        return;
      }
      
      const y = progress * window.innerHeight;
      const x = startX + (Math.random()-0.5)*100*progress;
      const rotation = progress*360*Math.random();
      
      confetti.style.top = y + 'px';
      confetti.style.left = x + '%';
      confetti.style.transform = `rotate(${rotation}deg)`;
      confetti.style.opacity = 1 - progress;
      
      requestAnimationFrame(animate);
    }
    animate();
  }
}

/* --- TAB: HOY --- */
async function renderTabHoy(){
  const body = $('#tabBody');
  body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--ink-soft);">Cargando...</div>';
  const today = todayStr();
  const keys = await sList('registro:'+today+':');
  const submittedIds = new Set(keys.map(k=>k.split(':')[2]));
  const total = State.names.length;
  const yes = submittedIds.size;

  let rows = State.names.map(n=>{
    const has = submittedIds.has(n.id);
    return { n, has };
  });
  if(State.filter==='pendientes') rows = rows.filter(r=>!r.has);
  if(State.filter==='listas') rows = rows.filter(r=>r.has);

  body.innerHTML = `
    <div class="section-title"><div><h2>Hoy · ${fmtDateLong(today)}</h2><p>${yes} de ${total} ya subieron su evidencia</p></div></div>
    <div class="filter-chips">
      <div class="chip ${State.filter==='todas'?'active':''}" data-f="todas">Todas</div>
      <div class="chip ${State.filter==='pendientes'?'active':''}" data-f="pendientes">Pendientes</div>
      <div class="chip ${State.filter==='listas'?'active':''}" data-f="listas">Ya subieron</div>
    </div>
    <div id="rosterList">${rows.map(r=>rosterRowHTML(r.n, r.has, 'hoy')).join('')}</div>
  `;
  body.querySelectorAll('.chip').forEach(c=> c.onclick=()=>{ State.filter=c.dataset.f; renderTabHoy(); });
  body.querySelectorAll('.roster-row').forEach(row=>{
    row.onclick = ()=> openGirlModal(row.dataset.id, today);
  });
}
function rosterRowHTML(n, has, mode, pct){
  const initials = n.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  if(mode==='hoy'){
    return `<div class="roster-row" data-id="${n.id}">
      <div class="avatar">${initials}</div>
      <div class="roster-name">${n.nombre}</div>
      <span class="badge ${has?'si':'no'}">${has?'Listo ✓':'Pendiente'}</span>
    </div>`;
  }
  const color = pct>=70?'var(--success)':pct>=40?'var(--gold)':'var(--danger)';
  return `<div class="roster-row" data-id="${n.id}">
    <div class="avatar">${initials}</div>
    <div style="flex:1;">
      <div class="roster-name">${n.nombre}</div>
      <div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${color};"></div></div>
    </div>
    <div class="pct-num" style="color:${color}">${pct}%</div>
  </div>`;
}

/* --- TAB: RESUMEN --- */
async function renderTabResumen(){
  const body = $('#tabBody');
  body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--ink-soft);">Calculando avance...</div>';
  const today = new Date();
  const dim = daysInMonth(today.getFullYear(), today.getMonth()+1);
  const mKey = monthKey(todayStr());
  const results = [];
  for(const n of State.names){
    const st = await sGet('statsmonth:'+n.id+':'+mKey);
    const totalM = st ? st.totalM : 0;
    const pct = Math.round((totalM/dim)*100);
    results.push({ n, totalM, pct });
  }
  results.sort((a,b)=> a.pct-b.pct);
  const riesgo = results.filter(r=>r.pct<40).length;

  body.innerHTML = `
    <div class="section-title"><div><h2>Resumen del mes</h2><p>${riesgo} señorita(s) con avance menor al 40%</p></div></div>
    <div id="resumenList">${results.map(r=>rosterRowHTML(r.n, null, 'resumen', r.pct)).join('')}</div>
  `;
  body.querySelectorAll('.roster-row').forEach(row=>{
    row.onclick = ()=> openGirlModal(row.dataset.id, todayStr());
  });
}

/* --- TAB: DEVOCIONALES --- */
async function renderTabDevocionales(){
  const body = $('#tabBody');
  body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--ink-soft);">Cargando calendario...</div>';
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1;
  const monthPrefix = `devocional:${y}-${String(m).padStart(2,'0')}`;
  const existingKeys = new Set(await sList(monthPrefix));
  const dim = daysInMonth(y,m);
  let selected = State.selectedDay || todayStr();
  if(!isDateEditable(selected)) selected = todayStr();
  State.selectedDay = selected;

  let dots = '';
  for(let d=1; d<=dim; d++){
    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const editable = isDateEditable(ds);
    dots += `<div class="day-dot ${existingKeys.has('devocional:'+ds)?'has':''} ${ds===selected?'selected':''} ${editable?'':'locked'}" data-d="${ds}" data-editable="${editable}">${d}</div>`;
  }
  const devo = (await sGet('devocional:'+selected)) || {};
  const editable = isDateEditable(selected);

  body.innerHTML = `
    <div class="section-title"><div><h2>Devocionales del mes</h2><p>Solo puedes publicar de ayer a mañana</p></div></div>
    <div class="day-list">${dots}</div>
    <div class="card">
      <label>Fecha seleccionada</label>
      <input type="text" value="${fmtDateLong(selected)}" disabled style="background:var(--gold-soft);border:none;">
      ${editable ? `
      <label>Imagen del devocional</label>
      ${devo.imagen ? `<div class="thumb-wrap" style="margin-bottom:10px;"><img src="${devo.imagen}"></div>` : ''}
      <button class="btn btn-ghost" id="pickImg" style="width:100%;">${devo.imagen? 'Cambiar imagen' : 'Seleccionar imagen'}</button>
      <input type="file" id="dImgInput" accept="image/*" style="display:none;">
      <label>Mensaje motivacional</label>
      <textarea id="dTexto" placeholder="Escribe el mensaje motivacional de hoy...">${devo.texto||''}</textarea>
      <button class="btn btn-primary" id="saveDevo">Publicar este día</button>
      ` : `
      <div class="lock-note">🔒 Este día ya no se puede editar. Solo puedes publicar el devocional de ayer, hoy o mañana.</div>
      `}
    </div>
  `;
  let pendingImg = devo.imagen || null;
  body.querySelectorAll('.day-dot').forEach(dot=>{
    dot.onclick = ()=>{
      if(dot.dataset.editable === 'false'){ toast('🔒 Ese día está fuera del rango permitido'); return; }
      State.selectedDay = dot.dataset.d; renderTabDevocionales();
    };
  });
  if(editable){
    $('#pickImg').onclick = ()=> $('#dImgInput').click();
    $('#dImgInput').onchange = async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      $('#pickImg').textContent = 'Procesando imagen...';
      pendingImg = await compressImage(file, 800, 0.7);
      $('#pickImg').textContent = 'Cambiar imagen';
      toast('Imagen lista, no olvides publicar');
    };
    $('#saveDevo').onclick = async ()=>{
      if(!isDateEditable(selected)){ toast('🔒 Ese día ya no se puede editar'); return; }
      const texto = $('#dTexto').value.trim();
      if(!pendingImg && !texto){ toast('Agrega la imagen o el mensaje del día'); return; }
      $('#saveDevo').textContent = 'Publicando...';
      await sSet('devocional:'+selected, { imagen: pendingImg, texto });
      toast('Devocional publicado ✦');
      renderTabDevocionales();
    };
  }
}

/* --- TAB: SEÑORITAS --- */
async function renderTabSenoritas(){
  const body = $('#tabBody');
  body.innerHTML = `
    <div class="section-title"><div><h2>Señoritas</h2><p>${State.names.length} registradas</p></div></div>
    <div class="card" style="margin-bottom:16px;">
      <label>Agregar nueva señorita</label>
      <input type="text" id="newName" placeholder="Nombre y apellido">
      <label>PIN inicial (4 dígitos)</label>
      <input type="tel" id="newPin" maxlength="4" placeholder="0000">
      <button class="btn btn-primary btn-sm" id="addGirl" style="width:100%;">Agregar</button>
    </div>
    <div id="senoritaList">${State.names.map(n=>`
      <div class="roster-row" style="cursor:default;">
        <div class="avatar">${n.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div style="flex:1;">
          <div class="roster-name">${n.nombre}</div>
          <div class="roster-sub">PIN: ${n.pin}</div>
        </div>
        <button class="icon-btn" data-reset="${n.id}">Cambiar PIN</button>
      </div>`).join('')}</div>
  `;
  $('#addGirl').onclick = async ()=>{
    const name = $('#newName').value.trim();
    const pin = $('#newPin').value.trim() || '0000';
    if(!name){ toast('Escribe el nombre'); return; }
    const newEntry = { id: slugId(name, State.names.length+Math.floor(Math.random()*999)), nombre:name, pin };
    State.names.push(newEntry);
    await sSet('nombres', State.names);
    toast('Señorita agregada 🌸');
    renderTabSenoritas();
  };
  body.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.reset;
      const p = prompt('Nuevo PIN (4 dígitos):');
      if(!p) return;
      const entry = State.names.find(x=>x.id===id);
      entry.pin = p.trim();
      await sSet('nombres', State.names);
      toast('PIN actualizado');
      renderTabSenoritas();
    };
  });
}

/* --- MODAL: girl detail (leader) --- */
async function openGirlModal(id, dateStr){
  const n = State.names.find(x=>x.id===id);
  const streak = (await sGet('streak:'+id)) || { racha:0 };
  const monthStats = (await sGet('statsmonth:'+id+':'+monthKey(dateStr))) || { totalM:0 };
  const reg = await sGet('registro:'+dateStr+':'+id);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close">×</button>
      <h3>${n.nombre}</h3>
      <p style="color:var(--ink-soft);font-size:13px;margin-top:0;">${monthStats.totalM} días presentados este mes · racha ${streak.racha}🔥</p>
      ${reg && (reg.fotos || reg.foto) ? `${renderEvidenceGallery(reg)}<p style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Subido: ${new Date(reg.hora).toLocaleString('es-PE')}</p>` : `<div class="lock-note">🕊️ No ha subido evidencia el ${fmtDateLong(dateStr)}.</div>`}
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}
