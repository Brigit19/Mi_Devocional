<style>
  :root{
    --bg:#FDF5F8;
    --bg-card:#FFFFFF;
    --ink:#5B4B57;
    --ink-soft:#AD90A3;
    --primary:#C98CAE;
    --primary-dark:#93547A;
    --fuchsia:#EFB8D2;
    --gold:#D9B368;
    --gold-soft:#FCEEDD;
    --success:#5E9A78;
    --success-bg:#E7F5EC;
    --danger:#C97676;
    --danger-bg:#FBEAEA;
    --line:#F3E1EB;
    --shadow: 0 10px 30px -12px rgba(147,84,122,0.22);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Playfair Display',serif; }
  #app{ max-width:520px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:40px;}
  .wide #app{ max-width:960px; }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 14px; position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--fuchsia), var(--primary-dark));
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
  }
  .brand-text{ font-family:'Playfair Display',serif; font-weight:600; font-size:17px; color:var(--primary-dark); line-height:1.1;}
  .brand-text small{ display:block; font-family:'Inter',sans-serif; font-weight:500; font-size:11px; letter-spacing:.08em; color:var(--ink-soft); text-transform:uppercase; }
  .icon-btn{
    background:none;border:none; color:var(--ink-soft); cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    padding:8px 12px; border-radius:20px; transition:.15s;
  }
  .icon-btn:hover{ background:var(--gold-soft); color:var(--primary-dark); }

  main{ padding:0 20px; }
  .screen{ animation: fadeUp .35s ease both; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ---------- role select ---------- */
  .hero{ text-align:center; padding:36px 12px 18px; }
  .hero-mark{
    width:64px;height:64px;margin:0 auto 18px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--fuchsia), var(--primary-dark) 70%);
    box-shadow: var(--shadow), inset 0 0 0 3px rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif; color:#fff; font-size:26px;
  }
  .hero h1{ font-size:26px; margin:0 0 6px; color:var(--primary-dark); font-weight:600; }
  .hero p{ color:var(--ink-soft); font-size:14px; margin:0; }

  .role-grid{ display:flex; flex-direction:column; gap:14px; margin-top:28px; }
  .role-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:18px;
    padding:22px; text-align:left; cursor:pointer; display:flex; align-items:center; gap:16px;
    transition:.18s; box-shadow:0 2px 10px -6px rgba(122,31,75,.15);
  }
  .role-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--fuchsia); }
  .role-emblem{
    width:46px;height:46px;border-radius:14px; flex-shrink:0;
    display:flex;align-items:center;justify-content:center; font-size:20px;
    background:var(--gold-soft); color:var(--primary-dark);
  }
  .role-card h3{ margin:0 0 3px; font-size:17px; color:var(--ink); }
  .role-card p{ margin:0; font-size:12.5px; color:var(--ink-soft); }

  /* ---------- forms ---------- */
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:20px;
    padding:24px; box-shadow:0 2px 14px -8px rgba(122,31,75,.18);
  }
  label{ display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:16px 0 6px; }
  label:first-child{ margin-top:0; }
  select, input[type=text], input[type=password], input[type=tel], textarea{
    width:100%; padding:13px 14px; border-radius:12px; border:1.5px solid var(--line);
    background:#fff; font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
    outline:none; transition:.15s;
  }
  select:focus, input:focus, textarea:focus{ border-color:var(--fuchsia); box-shadow:0 0 0 3px rgba(192,52,122,.12); }
  textarea{ resize:vertical; min-height:90px; line-height:1.5; }
  .pin-row{ display:flex; gap:10px; }
  .pin-row input{ text-align:center; font-size:22px; letter-spacing:.1em; font-weight:600; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:14px 18px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px; margin-top:20px;
    transition:.15s; letter-spacing:.01em;
  }
  .btn-primary{ background:linear-gradient(135deg, var(--fuchsia), var(--primary-dark)); color:#fff; box-shadow:0 8px 20px -8px rgba(122,31,75,.5); }
  .btn-primary:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:transparent; color:var(--primary-dark); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--fuchsia); background:var(--gold-soft); }
  .btn-sm{ width:auto; padding:9px 16px; font-size:13px; margin-top:0; }
  .error-msg{ color:var(--danger); font-size:12.5px; margin-top:10px; display:none; }

  /* ---------- devotional hero card ---------- */
  .date-chip{
    display:inline-block; font-size:11.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--primary-dark); background:var(--gold-soft); padding:6px 14px; border-radius:20px; margin-bottom:14px;
  }
  .devo-card{
    background:linear-gradient(160deg, #fff 0%, var(--gold-soft) 130%);
    border:1px solid var(--line); border-radius:24px; padding:28px 24px; position:relative; overflow:hidden;
  }
  .devo-card::before{
    content:"”"; position:absolute; top:-10px; right:16px; font-family:'Playfair Display',serif;
    font-size:120px; color:var(--fuchsia); opacity:.08; line-height:1;
  }
  .devo-verse{ font-family:'Playfair Display',serif; font-style:italic; font-size:19px; line-height:1.55; color:var(--primary-dark); margin:0 0 6px; position:relative; }
  .devo-ref{ font-size:12.5px; font-weight:600; color:var(--fuchsia); letter-spacing:.03em; margin:0 0 18px; }
  .devo-img{ width:100%; border-radius:16px; display:block; margin-bottom:16px; position:relative; box-shadow:0 6px 18px -10px rgba(147,84,122,.35); }
  .devo-text{ font-family:'Playfair Display',serif; font-style:italic; font-size:16px; line-height:1.7; color:var(--ink); position:relative; white-space:pre-wrap; }

  .streak-row{ display:flex; gap:10px; margin:18px 0 4px; }
  .stat-pill{
    flex:1; background:var(--bg-card); border:1px solid var(--line); border-radius:16px;
    padding:14px 12px; text-align:center;
  }
  .stat-pill .num{ font-family:'Playfair Display',serif; font-size:22px; color:var(--primary-dark); font-weight:600; }
  .stat-pill .lbl{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-top:2px; }

  /* seal / upload */
  .seal-zone{ margin-top:22px; text-align:center; }
  .seal{
    width:130px; height:130px; border-radius:50%; margin:0 auto 14px; position:relative; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, var(--fuchsia), var(--primary-dark) 75%);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    box-shadow: var(--shadow), inset 0 0 0 4px rgba(255,255,255,.25);
    border:none; color:#fff; font-family:'Inter',sans-serif;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .seal:active{ transform:scale(.94); }
  .seal.done{ background:radial-gradient(circle at 35% 30%, #7fae8c, var(--success) 75%); animation: sealStamp .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes sealStamp{ 0%{transform:scale(.6) rotate(-8deg); opacity:0;} 60%{transform:scale(1.08) rotate(3deg);} 100%{transform:scale(1) rotate(0);} }
  .seal .glyph{ font-size:34px; }
  .seal .cap{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; margin-top:6px; }
  .seal-hint{ font-size:12.5px; color:var(--ink-soft); }
  .thumb-wrap{ margin-top:16px; }
  .thumb-wrap img{ width:100%; max-height:220px; object-fit:cover; border-radius:16px; border:1px solid var(--line); }

  .empty-devo{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty-devo .glyph{ font-size:34px; margin-bottom:10px; }

  /* ---------- leader dashboard ---------- */
  .tabs{ display:flex; gap:6px; background:var(--bg-card); border:1px solid var(--line); padding:5px; border-radius:16px; margin-bottom:20px; overflow-x:auto; }
  .tab{ flex:1; text-align:center; padding:10px 8px; border-radius:12px; font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap; transition:.15s; }
  .tab.active{ background:linear-gradient(135deg, var(--fuchsia), var(--primary-dark)); color:#fff; }

  .section-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .section-title h2{ font-size:19px; margin:0; color:var(--primary-dark); }
  .section-title p{ font-size:12px; color:var(--ink-soft); margin:2px 0 0; }

  .roster-row{
    display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--bg-card);
    border:1px solid var(--line); border-radius:14px; margin-bottom:8px; cursor:pointer; transition:.15s;
  }
  .roster-row:hover{ border-color:var(--fuchsia); }
  .avatar{
    width:38px;height:38px;border-radius:50%; flex-shrink:0; display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif; font-weight:600; font-size:14px; color:#fff;
    background:linear-gradient(135deg, var(--fuchsia), var(--primary-dark));
  }
  .roster-name{ font-size:14px; font-weight:600; flex:1; }
  .roster-sub{ font-size:11px; color:var(--ink-soft); }
  .badge{ font-size:11px; font-weight:700; padding:5px 11px; border-radius:20px; }
  .badge.si{ background:var(--success-bg); color:var(--success); }
  .badge.no{ background:var(--danger-bg); color:var(--danger); }

/* ================= STORAGE HELPERS ================= */
async function sGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), shared); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}
async function sList(prefix, shared){
  try{ const r = await window.storage.list(prefix, shared); return r ? r.keys : []; }
  catch(e){ return []; }
}

function slugId(name, idx){
  return 'u' + idx + '_' + name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]+/g,'').slice(0,10);
}

async function ensureSeed(){
  let names = await sGet('nombres', true);
  if(!names){
    names = DEFAULT_NAMES.map((n,i)=>({ id: slugId(n,i), nombre:n, pin:'0000' }));
    await sSet('nombres', names, true);
  }
  let config = await sGet('config', true);
  if(!config){
    config = { leaderPin: '1234' };
    await sSet('config', config, true);
  }
  return { names, config };
}

const $ = sel => document.querySelector(sel);
const main = document.getElementById('main');

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDateLong(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${meses[m-1]} de ${y}`;
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }

function compressImage(file, maxW=800, quality=0.65){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function computeAndSaveStats(userId, dateStr){
  const prev = (await sGet('stats:'+userId, true)) || { totalM:0, totalDias:0, racha:0, ultimaFecha:null };
  let racha = prev.racha || 0;
  if(prev.ultimaFecha){
    const prevD = new Date(prev.ultimaFecha+'T00:00:00');
    const curD = new Date(dateStr+'T00:00:00');
    const diff = Math.round((curD-prevD)/86400000);
    racha = diff===1 ? racha+1 : 1;
  } else { racha = 1; }
  const stats = { totalM: (prev.totalM||0)+1, totalDias:(prev.totalDias||0)+1, racha, ultimaFecha: dateStr };
  await sSet('stats:'+userId, stats, true);
  return stats;
}

async function renderTabResumen(){

  results.sort((a,b)=> a.pct-b.pct);
  const riesgo = results.filter(r=>r.pct<40).length;

  body.innerHTML = `
    <div class="section-title"><div><h2>Resumen del mes</h2><p>${riesgo} señorita(s) con avance menor al 40%</p></div></div>

    const texto = $('#dTexto').value.trim();
    if(!pendingImg && !texto){ toast('Agrega la imagen o el mensaje del día'); return; }
    devos[selected] = { imagen: pendingImg, texto };
    await sSet('devocionales', devos, true);
    toast('Devocional publicado ✦');
    renderTabDevocionales();
  };
}

/* --- TAB: SEÑORITAS --- */
async function renderTabSenoritas(){
  const body = $('#tabBody');
  body.innerHTML = `
    <div class="section-title"><div><h2>Señoritas</h2><p>${State.names.length} registradas</p></div></div>
    <div class="card" style="margin-bottom:16px;">
      <label>Agregar nueva señorita</label>
      <input type="text" id="newName" placeholder="Nombre y apellido">
      <label>PIN inicial (4 dígitos)</label>
      <input type="tel" id="newPin" maxlength="4" placeholder="0000">
      <button class="btn btn-primary btn-sm" id="addGirl" style="width:100%;">Agregar</button>
    </div>
    <div id="senoritaList">${State.names.map(n=>`
      <div class="roster-row" style="cursor:default;">
        <div class="avatar">${n.nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div style="flex:1;">
          <div class="roster-name">${n.nombre}</div>
          <div class="roster-sub">PIN: ${n.pin}</div>
        </div>
        <button class="icon-btn" data-reset="${n.id}">Cambiar PIN</button>
      </div>`).join('')}</div>
  `;
  $('#addGirl').onclick = async ()=>{
    const name = $('#newName').value.trim();
    const pin = $('#newPin').value.trim() || '0000';
    if(!name){ toast('Escribe el nombre'); return; }
    const newEntry = { id: slugId(name, State.names.length+Math.floor(Math.random()*999)), nombre:name, pin };
    State.names.push(newEntry);
    await sSet('nombres', State.names, true);
    toast('Señorita agregada 🌸');
    renderTabSenoritas();
  };
  body.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.reset;
      const p = prompt('Nuevo PIN (4 dígitos):');
      if(!p) return;
      const entry = State.names.find(x=>x.id===id);
      entry.pin = p.trim();
      await sSet('nombres', State.names, true);
      toast('PIN actualizado');
      renderTabSenoritas();
    };
  });
}

/* --- MODAL: girl detail (leader) --- */
async function openGirlModal(id, dateStr){
  const n = State.names.find(x=>x.id===id);
  const st = (await sGet('stats:'+id, true)) || { totalM:0, racha:0 };
  const reg = await sGet('registro:'+dateStr+':'+id, true);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close">×</button>
      <h3>${n.nombre}</h3>
      <p style="color:var(--ink-soft);font-size:13px;margin-top:0;">${st.totalM} días presentados este mes · racha ${st.racha}🔥</p>
      ${reg && reg.foto ? `<div class="thumb-wrap"><img src="${reg.foto}"></div><p style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Subido: ${new Date(reg.hora).toLocaleString('es-PE')}</p>` : `<div class="lock-note">🕊️ No ha subido evidencia el ${fmtDateLong(dateStr)}.</div>`}
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

init();
</script>
</body>
